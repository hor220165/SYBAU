name: sybau_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.6.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.5
  health: ^13.3.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  google_sign_in: ^6.2.2
  flutter_svg: ^2.0.17
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/Star_Pixel.png
    - assets/XP_Pixel.png
    - assets/SYBAU_Coin.png
    - assets/google_logo.svg
