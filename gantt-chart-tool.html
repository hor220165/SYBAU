<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Chart Project Manager</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252836;
    --surface3: #2f3347;
    --border: #3a3f55;
    --text: #e4e6f0;
    --text2: #9498ad;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --orange: #fdcb6e;
    --red: #ff7675;
    --pink: #fd79a8;
    --blue: #74b9ff;
    --teal: #55efc4;
    --yellow: #ffeaa7;
    --weekend: rgba(255,255,255,0.03);
    --today: rgba(108,92,231,0.15);
    --row-hover: rgba(108,92,231,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo { font-size:20px; font-weight:700; color:var(--accent2); display:flex; align-items:center; gap:8px; }
  .logo svg { width:28px; height:28px; }
  .project-name {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    outline: none;
    min-width: 150px;
  }
  .project-name:hover, .project-name:focus { border-color: var(--border); background: var(--surface2); }
  .header-actions { display:flex; align-items:center; gap:10px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px;
    cursor: pointer; transition: all 0.2s; font-weight: 500;
  }
  .btn:hover { background: var(--surface3); border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7c6ef7; }
  .btn svg { width:16px; height:16px; }

  /* Toolbar */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .toolbar-group { display:flex; align-items:center; gap:6px; }
  .toolbar-divider { width:1px; height:24px; background:var(--border); }
  .zoom-btn {
    width:32px; height:32px; border-radius:6px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text2); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px;
    transition: all 0.2s;
  }
  .zoom-btn:hover { background:var(--surface3); color:var(--text); }
  .zoom-label { font-size:12px; color:var(--text2); min-width:40px; text-align:center; }
  .view-toggle {
    display:flex; border-radius:8px; overflow:hidden; border:1px solid var(--border);
  }
  .view-toggle button {
    padding:6px 14px; background:var(--surface2); color:var(--text2);
    border:none; font-size:12px; cursor:pointer; transition:all 0.2s;
  }
  .view-toggle button.active { background:var(--accent); color:#fff; }
  .view-toggle button:not(:last-child) { border-right:1px solid var(--border); }
  .search-box {
    position:relative; display:flex; align-items:center;
  }
  .search-box input {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:6px 12px 6px 32px; color:var(--text); font-size:13px; width:200px;
    outline:none; transition:all 0.2s;
  }
  .search-box input:focus { border-color:var(--accent); width:260px; }
  .search-box svg { position:absolute; left:8px; width:16px; height:16px; color:var(--text2); }
  .stats { display:flex; gap:16px; margin-left:auto; }
  .stat { font-size:12px; color:var(--text2); }
  .stat span { color:var(--text); font-weight:600; }

  /* Main layout */
  .main { flex:1; display:flex; overflow:hidden; position:relative; }
  
  /* Task list panel */
  .task-panel {
    width: 380px; min-width: 280px; flex-shrink:0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display:flex; flex-direction:column;
    overflow: hidden;
  }
  .task-panel-header {
    display:flex; align-items:center; padding:10px 16px;
    border-bottom:1px solid var(--border); gap:8px; flex-shrink:0;
  }
  .task-panel-header .col { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); font-weight:600; }
  .col-name { flex:1; }
  .col-assignee { width:80px; text-align:center; }
  .col-status { width:80px; text-align:center; }
  .col-dates { width:90px; text-align:center; }
  .task-list { flex:1; overflow-y:auto; overflow-x:hidden; }
  .task-list::-webkit-scrollbar { width:6px; }
  .task-list::-webkit-scrollbar-track { background:transparent; }
  .task-list::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

  .task-row {
    display:flex; align-items:center; padding:0 16px; min-height:40px;
    border-bottom:1px solid rgba(255,255,255,0.04);
    cursor:pointer; transition:background 0.15s;
    position:relative;
  }
  .task-row:hover { background:var(--row-hover); }
  .task-row.selected { background:rgba(108,92,231,0.12); }
  .task-row.group-row { background:var(--surface2); font-weight:600; }
  .task-indent { width:24px; flex-shrink:0; }
  .task-color {
    width:4px; height:24px; border-radius:2px; margin-right:10px; flex-shrink:0;
  }
  .task-name {
    flex:1; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:flex; align-items:center; gap:6px;
  }
  .task-name .expand-btn {
    width:18px; height:18px; border:none; background:transparent;
    color:var(--text2); cursor:pointer; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; transition:all 0.2s;
  }
  .task-name .expand-btn:hover { background:var(--surface3); color:var(--text); }
  .task-assignee {
    width:80px; text-align:center; font-size:12px; color:var(--text2);
    display:flex; justify-content:center;
  }
  .avatar {
    width:24px; height:24px; border-radius:50%; font-size:10px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#fff;
  }
  .task-status { width:80px; display:flex; justify-content:center; }
  .status-badge {
    padding:3px 8px; border-radius:10px; font-size:10px; font-weight:600;
  }
  .status-todo { background:rgba(148,152,173,0.15); color:var(--text2); }
  .status-progress { background:rgba(108,92,231,0.15); color:var(--accent2); }
  .status-review { background:rgba(253,203,110,0.15); color:var(--orange); }
  .status-done { background:rgba(0,206,201,0.15); color:var(--green); }
  .task-dates { width:90px; text-align:center; font-size:11px; color:var(--text2); }

  /* Gantt panel */
  .gantt-panel {
    flex:1; overflow:auto; position:relative;
  }
  .gantt-panel::-webkit-scrollbar { width:8px; height:8px; }
  .gantt-panel::-webkit-scrollbar-track { background:var(--bg); }
  .gantt-panel::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:4px; }
  
  .gantt-canvas {
    position:relative; min-height:100%;
  }
  .gantt-header {
    position:sticky; top:0; z-index:10;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    display:flex;
  }
  .gantt-corner {
    min-width:380px; max-width:380px; flex-shrink:0;
    border-right:1px solid var(--border);
  }
  .gantt-timeline {
    display:flex; flex:1; overflow:hidden;
  }
  .gantt-month {
    border-right:1px solid var(--border);
    overflow:hidden;
  }
  .gantt-month-label {
    padding:8px 12px; font-size:12px; font-weight:600; color:var(--text2);
    border-bottom:1px solid var(--border); white-space:nowrap;
  }
  .gantt-weeks { display:flex; }
  .gantt-week {
    border-right:1px solid rgba(255,255,255,0.05);
    flex-shrink:0;
  }
  .gantt-week-label {
    padding:6px 4px; font-size:10px; color:var(--text2);
    text-align:center; border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  .gantt-days { display:flex; }
  .gantt-day {
    flex-shrink:0; border-right:1px solid rgba(255,255,255,0.03);
  }
  .gantt-day-label {
    padding:4px 0; font-size:10px; color:var(--text2);
    text-align:center;
  }
  .gantt-day.weekend { background:var(--weekend); }
  .gantt-day.today .gantt-day-label { color:var(--accent2); font-weight:700; }

  /* Grid + Bars */
  .gantt-body { position:relative; }
  .gantt-grid-row {
    height:40px; border-bottom:1px solid rgba(255,255,255,0.04);
    position:relative;
  }
  .gantt-grid-row.group-row { background:var(--surface2); }
  .gantt-grid-row:hover { background:var(--row-hover); }
  .gantt-grid-row.weekend-col { }
  
  .gantt-bar-container {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none;
  }
  .gantt-bar {
    position:absolute;
    height:24px;
    border-radius:6px;
    top:8px;
    cursor:pointer;
    pointer-events:all;
    display:flex;
    align-items:center;
    padding:0 8px;
    font-size:11px;
    font-weight:500;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
    transition: box-shadow 0.2s, transform 0.15s;
    user-select: none;
  }
  .gantt-bar:hover {
    box-shadow:0 2px 12px rgba(0,0,0,0.3);
    transform:translateY(-1px);
    z-index:5;
  }
  .gantt-bar .bar-progress {
    position:absolute; left:0; top:0; bottom:0;
    border-radius:6px;
    opacity:0.3;
    background:#fff;
  }
  .gantt-bar .bar-label { position:relative; z-index:2; }
  .gantt-bar .resize-handle {
    position:absolute; top:0; bottom:0; width:8px;
    cursor:ew-resize; pointer-events:all; z-index:3;
  }
  .gantt-bar .resize-handle.left { left:0; border-radius:6px 0 0 6px; }
  .gantt-bar .resize-handle.right { right:0; border-radius:0 6px 6px 0; }
  .gantt-bar .resize-handle:hover { background:rgba(255,255,255,0.2); }

  /* Dependency arrows */
  .dep-arrow {
    fill:none; stroke:var(--text2); stroke-width:1.5;
    marker-end:url(#arrowhead);
    opacity:0.5;
  }

  /* Today line */
  .today-line {
    position:absolute; top:0; bottom:0; width:2px;
    background:var(--accent); z-index:4; opacity:0.6;
  }
  .today-line::before {
    content:'TODAY'; position:absolute; top:-20px; left:50%;
    transform:translateX(-50%); font-size:9px; font-weight:700;
    color:var(--accent); letter-spacing:0.5px;
  }

  /* Modal */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
    z-index:100; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; width:560px; max-height:85vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .modal-header {
    padding:20px 24px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-header h2 { font-size:18px; font-weight:600; }
  .modal-close {
    width:32px; height:32px; border:none; background:var(--surface2);
    border-radius:8px; color:var(--text2); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; transition:all 0.2s;
  }
  .modal-close:hover { background:var(--surface3); color:var(--text); }
  .modal-body { padding:24px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
  .form-row { display:flex; gap:12px; }
  .form-row .form-group { flex:1; }
  input[type="text"], input[type="date"], input[type="number"], select, textarea {
    width:100%; padding:10px 12px; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:14px; outline:none;
    transition:border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:60px; }
  select { cursor:pointer; }
  .color-options { display:flex; gap:8px; flex-wrap:wrap; }
  .color-opt {
    width:28px; height:28px; border-radius:50%; cursor:pointer;
    border:2px solid transparent; transition:all 0.2s;
  }
  .color-opt:hover, .color-opt.selected { border-color:#fff; transform:scale(1.15); }
  .modal-footer {
    padding:16px 24px; border-top:1px solid var(--border);
    display:flex; justify-content:flex-end; gap:10px;
  }
  .form-actions { display:flex; gap:10px; }
  .btn-danger { background:rgba(255,118,117,0.15); border-color:var(--red); color:var(--red); }
  .btn-danger:hover { background:rgba(255,118,117,0.25); }

  /* Context menu */
  .context-menu {
    display:none; position:fixed; z-index:200;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:6px; min-width:180px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
  }
  .context-menu.show { display:block; }
  .context-item {
    padding:8px 14px; border-radius:6px; font-size:13px;
    cursor:pointer; display:flex; align-items:center; gap:8px;
    transition:background 0.15s; color:var(--text);
  }
  .context-item:hover { background:var(--surface2); }
  .context-item.danger { color:var(--red); }
  .context-divider { height:1px; background:var(--border); margin:4px 8px; }

  /* Tooltip */
  .tooltip {
    display:none; position:fixed; z-index:300;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:12px 16px; min-width:220px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3); pointer-events:none;
  }
  .tooltip.show { display:block; }
  .tooltip h4 { font-size:14px; margin-bottom:8px; }
  .tooltip-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
  .tooltip-row .label { color:var(--text2); }
  .tooltip-row .value { color:var(--text); font-weight:500; }
  .tooltip-bar { height:4px; background:var(--surface3); border-radius:2px; margin-top:8px; overflow:hidden; }
  .tooltip-bar-fill { height:100%; border-radius:2px; transition:width 0.3s; }

  /* Scroll sync spacer */
  .scroll-spacer { display:none; }

  /* Empty state */
  .empty-state {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; color:var(--text2); text-align:center; padding:40px;
  }
  .empty-state svg { width:64px; height:64px; margin-bottom:16px; opacity:0.4; }
  .empty-state h3 { font-size:18px; margin-bottom:8px; color:var(--text); }
  .empty-state p { font-size:14px; margin-bottom:20px; }

  /* Notification */
  .toast {
    position:fixed; bottom:24px; right:24px; z-index:500;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:12px 20px; font-size:13px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    transform:translateY(100px); opacity:0;
    transition:all 0.3s ease;
  }
  .toast.show { transform:translateY(0); opacity:1; }

  /* Drag preview */
  .drag-preview {
    position:fixed; z-index:250; pointer-events:none; opacity:0.8;
  }
</style>
</head>
<body>
<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none">
        <rect x="2" y="4" width="24" height="4" rx="2" fill="#6c5ce7"/>
        <rect x="2" y="12" width="16" height="4" rx="2" fill="#a29bfe"/>
        <rect x="2" y="20" width="20" height="4" rx="2" fill="#00cec9"/>
      </svg>
      GanttPro
    </div>
    <input class="project-name" id="projectName" value="Website Redesign Project" spellcheck="false"/>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="undo()" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h7a4 4 0 100 0H3"/><path d="M3 7l3-3M3 7l3 3"/></svg>
      Undo
    </button>
    <button class="btn" onclick="exportJSON()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10v3a1 1 0 001 1h10a1 1 0 001-1v-3M8 2v8M5 7l3 3 3-3"/></svg>
      Export
    </button>
    <button class="btn" onclick="importJSON()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6v-3a1 1 0 011-1h10a1 1 0 011 1v3M8 10v-8M5 5l3-3 3 3"/></svg>
      Import
    </button>
    <button class="btn btn-primary" onclick="openAddTaskModal()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
      Add Task
    </button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-group">
    <button class="zoom-btn" onclick="zoomOut()">−</button>
    <span class="zoom-label" id="zoomLabel">100%</span>
    <button class="zoom-btn" onclick="zoomIn()">+</button>
  </div>
  <div class="toolbar-divider"></div>
  <div class="view-toggle">
    <button class="active" onclick="setView('day',this)">Day</button>
    <button onclick="setView('week',this)">Week</button>
    <button onclick="setView('month',this)">Month</button>
  </div>
  <div class="toolbar-divider"></div>
  <button class="btn" onclick="scrollToToday()" style="padding:6px 12px; font-size:12px;">Today</button>
  <button class="btn" onclick="fitToScreen()" style="padding:6px 12px; font-size:12px;">Fit</button>
  <div class="toolbar-divider"></div>
  <div class="search-box">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
    <input type="text" id="searchInput" placeholder="Search tasks..." oninput="filterTasks()"/>
  </div>
  <div class="stats" id="stats"></div>
</div>

<!-- Main -->
<div class="main">
  <!-- Task List Panel -->
  <div class="task-panel">
    <div class="task-panel-header">
      <div class="col col-name">Task</div>
      <div class="col col-assignee">Owner</div>
      <div class="col col-status">Status</div>
      <div class="col col-dates">Duration</div>
    </div>
    <div class="task-list" id="taskList"></div>
  </div>
  
  <!-- Gantt Panel -->
  <div class="gantt-panel" id="ganttPanel">
    <div class="gantt-canvas" id="ganttCanvas">
      <svg style="position:absolute;width:0;height:0;">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--text2)" opacity="0.5"/>
          </marker>
        </defs>
      </svg>
      <div class="gantt-header" id="ganttHeader"></div>
      <div class="gantt-body" id="ganttBody"></div>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Task</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Task Name</label>
        <input type="text" id="taskNameInput" placeholder="Enter task name..."/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="taskDescInput" placeholder="Optional description..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="taskStartInput"/>
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="date" id="taskEndInput"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="taskStatusInput">
            <option value="todo">To Do</option>
            <option value="progress">In Progress</option>
            <option value="review">In Review</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label>Progress %</label>
          <input type="number" id="taskProgressInput" min="0" max="100" value="0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Assignee</label>
          <input type="text" id="taskAssigneeInput" placeholder="Name..."/>
        </div>
        <div class="form-group">

<script>
// ─── Data ───
const COLORS = [
  '#6c5ce7','#a29bfe','#74b9ff','#0984e3','#00cec9','#55efc4',
  '#00b894','#fdcb6e','#e17055','#ff7675','#fd79a8','#e84393',
  '#636e72','#2d3436','#dfe6e9','#ffeaa7'
];
const AVATARS = ['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#ff7675','#74b9ff','#00b894','#e17055'];
const STATUS_LABELS = {todo:'To Do',progress:'In Progress',review:'In Review',done:'Done'};
const PRIORITY_LABELS = {low:'Low',medium:'Medium',high:'High',urgent:'Urgent'};

let project = {
  name:'Website Redesign Project',
  tasks:[
    {id:1,name:'Planning & Research',start:'2025-01-06',end:'2025-01-17',color:'#6c5ce7',status:'done',progress:100,assignee:'Alice',priority:'high',deps:[],desc:'',indent:0},
    {id:2,name:'Requirements Gathering',start:'2025-01-06',end:'2025-01-10',color:'#a29bfe',status:'done',progress:100,assignee:'Bob',priority:'high',deps:[],desc:'',indent:1},
    {id:3,name:'Competitor Analysis',start:'2025-01-13',end:'2025-01-17',color:'#74b9ff',status:'done',progress:100,assignee:'Carol',priority:'medium',deps:[2],desc:'',indent:1},
    {id:4,name:'Design Phase',start:'2025-01-20',end:'2025-02-14',color:'#00cec9',status:'progress',progress:65,assignee:'Alice',priority:'high',deps:[1],desc:'',indent:0},
    {id:5,name:'Wireframes',start:'2025-01-20',end:'2025-01-31',color:'#55efc4',status:'done',progress:100,assignee:'Diana',priority:'medium',deps:[1],desc:'',indent:1},
    {id:6,name:'Visual Design',start:'2025-02-03',end:'2025-02-14',color:'#fdcb6e',status:'progress',progress:45,assignee:'Alice',priority:'high',deps:[5],desc:'',indent:1},
    {id:7,name:'Design Review',start:'2025-02-14',end:'2025-02-14',color:'#e17055',status:'todo',progress:0,assignee:'Eve',priority:'high',deps:[6],desc:'',indent:1},
    {id:8,name:'Development',start:'2025-02-17',end:'2025-03-28',color:'#ff7675',status:'todo',progress:0,assignee:'Frank',priority:'urgent',deps:[7],desc:'',indent:0},
    {id:9,name:'Frontend Development',start:'2025-02-17',end:'2025-03-14',color:'#fd79a8',status:'todo',progress:0,assignee:'Frank',priority:'high',deps:[7],desc:'',indent:1},
    {id:10,name:'Backend Development',start:'2025-02-17',end:'2025-03-21',color:'#e84393',status:'todo',progress:0,assignee:'George',priority:'high',deps:[7],desc:'',indent:1},
    {id:11,name:'API Integration',start:'2025-03-03',end:'2025-03-21',color:'#0984e3',status:'todo',progress:0,assignee:'George',priority:'medium',deps:[10],desc:'',indent:1},
    {id:12,name:'Testing & QA',start:'2025-03-24',end:'2025-04-11',color:'#00b894',status:'todo',progress:0,assignee:'Helen',priority:'high',deps:[8],desc:'',indent:0},
    {id:13,name:'Unit Testing',start:'2025-03-24',end:'2025-04-04',color:'#636e72',status:'todo',progress:0,assignee:'Helen',priority:'medium',deps:[9,10],desc:'',indent:1},
    {id:14,name:'UAT',start:'2025-04-07',end:'2025-04-11',color:'#2d3436',status:'todo',progress:0,assignee:'Alice',priority:'high',deps:[13],desc:'',indent:1},
    {id:15,name:'Launch',start:'2025-04-14',end:'2025-04-18',color:'#ffeaa7',status:'todo',progress:0,assignee:'Alice',priority:'urgent',deps:[12],desc:'',indent:0},
  ]
};

let nextId = 16;
let zoom = 1;
let viewMode = 'day';
let selectedTaskId = null;
let contextTaskId = null;
let editingTaskId = null;
let undoStack = [];
let dragState = null;

// ─── Helpers ───
function daysBetween(a, b) {
  const d1 = new Date(a); const d2 = new Date(b);
  return Math.round((d2 - d1) / 86400000);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function dateToPixel(dateStr) {
  const origin = getOriginDate();
  const days = daysBetween(origin, dateStr);
  return days * getDayWidth();
}
function pixelToDate(px) {
  const origin = getOriginDate();
  const days = Math.round(px / getDayWidth());
  return addDays(origin.toISOString().slice(0,10), days);
}
function getDayWidth() {
  const base = {day:36, week:20, month:8}[viewMode];
  return base * zoom;
}
function getOriginDate() {
  if (!project.tasks.length) return new Date('2025-01-01');
  let min = project.tasks[0].start;
  project.tasks.forEach(t => { if (t.start < min) min = t.start; });
  const d = new Date(min);
  d.setDate(d.getDate() - 7);
  d.setDate(d.getDate() - d.getDay()); // snap to Sunday
  return d;
}
function getEndDate() {
  if (!project.tasks.length) return new Date('2025-03-01');
  let max = project.tasks[0].end;
  project.tasks.forEach(t => { if (t.end > max) max = t.end; });
  const d = new Date(max);
  d.setDate(d.getDate() + 14);
  return d;
}
function isWeekend(dateStr) {
  const d = new Date(dateStr);
  return d.getDay() === 0 || d.getDay() === 6;
}
function todayStr() {
  return new Date().toISOString().slice(0,10);
}
function formatDate(s) {
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}
function getTaskById(id) { return project.tasks.find(t => t.id === id); }
function getFilteredTasks() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) return project.tasks;
  return project.tasks.filter(t => t.name.toLowerCase().includes(q) || (t.assignee||'').toLowerCase().includes(q));
}
function saveState() {
  undoStack.push(JSON.parse(JSON.stringify(project)));
  if (undoStack.length > 50) undoStack.shift();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Render ───
function render() {
  renderTaskList();
  renderGantt();
  updateStats();
}

function renderTaskList() {
  const list = document.getElementById('taskList');
  const tasks = getFilteredTasks();
  if (!tasks.length) {
    list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="12" width="48" height="40" rx="4"/><path d="M8 24h48M20 12v12M34 12v12"/></svg><h3>No tasks yet</h3><p>Add your first task to get started</p></div>';
    return;
  }
  let html = '';
  tasks.forEach(t => {
    const isGroup = tasks.some(o => o.indent > t.indent && project.tasks.indexOf(o) === project.tasks.indexOf(t) + 1);
    const duration = daysBetween(t.start, t.end) + 1;
    html += `<div class="task-row ${t.id===selectedTaskId?'selected':''} ${isGroup?'group-row':''}" data-id="${t.id}" oncontextmenu="showContext(event,${t.id})" onclick="selectTask(${t.id})" ondblclick="openEditTaskModal(${t.id})">
      ${'<div class="task-indent"></div>'.repeat(t.indent)}
      <div class="task-color" style="background:${t.color}"></div>
      <div class="task-name">
        ${isGroup ? `<button class="expand-btn" onclick="event.stopPropagation();toggleExpand(${t.id})">▼</button>` : ''}
        ${t.name}
      </div>
      <div class="task-assignee">
        ${t.assignee ? `<div class="avatar" style="background:${AVATARS[t.assignee.charCodeAt(0)%AVATARS.length]}">${t.assignee[0]}</div>` : ''}
      </div>
      <div class="task-status"><span class="status-badge status-${t.status}">${STATUS_LABELS[t.status]}</span></div>
      <div class="task-dates">${duration}d</div>
    </div>`;
  });
  list.innerHTML = html;
}

function renderGantt() {
  const panel = document.getElementById('ganttPanel');
  const tasks = getFilteredTasks();
  const dayW = getDayWidth();
  const origin = getOriginDate();
  const endDate = getEndDate();
  const totalDays = daysBetween(origin.toISOString().slice(0,10), endDate.toISOString().slice(0,10)) + 1;
  const totalWidth = totalDays * dayW;
  const today = todayStr();
  
  // Header
  const headerEl = document.getElementById('ganttHeader');
  let hHtml = '<div class="gantt-corner"></div><div class="gantt-timeline" style="width:' + totalWidth + 'px">';
  
  // Build month/week/day columns
  let cur = new Date(origin);
  while (cur <= endDate) {
    const monthStart = new Date(cur);
    const monthName = cur.toLocaleDateString('en-US', {month:'long', year:'numeric'});
    let monthDays = 0;
    const monthIt = new Date(cur);
    while (monthIt.getMonth() === monthStart.getMonth() && monthIt <= endDate) {
      monthDays++;
      monthIt.setDate(monthIt.getDate() + 1);
    }
    hHtml += `<div class="gantt-month" style="width:${monthDays * dayW}px">`;
    hHtml += `<div class="gantt-month-label">${monthName}</div>`;
    if (viewMode === 'day' || viewMode === 'week') {
      hHtml += '<div class="gantt-weeks">';
      const wIt = new Date(monthStart);
      while (wIt.getMonth() === monthStart.getMonth() && wIt <= endDate) {
        const weekStart = new Date(wIt);
        let weekDays = 0;
        while (wIt.getDay() !== 6 && wIt.getMonth() === monthStart.getMonth() && wIt <= endDate) {
          weekDays++;
          wIt.setDate(wIt.getDate() + 1);
        }
        if (weekDays === 0) { wIt.setDate(wIt.getDate() + 1); continue; }
        if (wIt.getDay() === 6 || (wIt.getMonth() !== monthStart.getMonth())) {
          weekDays++;
          if (wIt.getMonth() === monthStart.getMonth()) wIt.setDate(wIt.getDate() + 1);
        }
        const weekLabel = weekStart.toLocaleDateString('en-US', {month:'short', day:'numeric'});
        hHtml += `<div class="gantt-week" style="width:${weekDays * dayW}px">`;
        if (viewMode === 'day') {
          hHtml += `<div class="gantt-week-label">${weekLabel}</div>`;
          hHtml += '<div class="gantt-days">';
          for (let d = 0; d < weekDays; d++) {
            const dayDate = addDays(weekStart.toISOString().slice(0,10), d);
            const dayNum = new Date(dayDate).getDate();
            const we = isWeekend(dayDate);
            const isToday = dayDate === today;
            hHtml += `<div class="gantt-day ${we?'weekend':''} ${isToday?'today':''}" style="width:${dayW}px"><div class="gantt-day-label">${dayNum}</div></div>`;
          }
          hHtml += '</div>';
        } else {
          hHtml += `<div class="gantt-week-label" style="height:32px;display:flex;align-items:center;justify-content:center">${weekLabel}</div>`;
        }
        hHtml += '</div>';
      }
      hHtml += '</div>';
    }
    hHtml += '</div>';
    cur = new Date(monthIt);
  }
  hHtml += '</div>';
  headerEl.innerHTML = hHtml;

  // Body
  const bodyEl = document.getElementById('ganttBody');
  let bHtml = '';
  
  // Weekend columns (vertical)
  // We'll draw them as positioned elements
  let weekendCols = '';
  for (let i = 0; i < totalDays; i++) {
    const dt = addDays(origin.toISOString().slice(0,10), i);
    if (isWeekend(dt)) {
      weekendCols += `<div style="position:absolute;left:${i*dayW}px;top:0;bottom:0;width:${dayW}px;background:var(--weekend);pointer-events:none;"></div>`;
    }
  }
  
  // Grid rows
  tasks.forEach((t, idx) => {
    const isGroup = tasks.some(o => o.indent > t.indent && project.tasks.indexOf(o) === project.tasks.indexOf(t) + 1);
    bHtml += `<div class="gantt-grid-row ${isGroup?'group-row':''}" data-id="${t.id}" style="position:relative;">`;
    bHtml += '</div>';
  });

  // Today line
  const todayX = dateToPixel(today);
  if (todayX >= 0 && todayX <= totalWidth) {
    bHtml += `<div class="today-line" style="left:${todayX}px;"></div>`;
  }

  bodyEl.innerHTML = weekendCols + bHtml;

  // Render bars
  let barsHtml = '';
  tasks.forEach((t, idx) => {
    const x = dateToPixel(t.start);
    const w = (daysBetween(t.start, t.end) + 1) * dayW;
    const row = bodyEl.querySelector(`.gantt-grid-row[data-id="${t.id}"]`);
    if (row) {
      row.style.height = '40px';
    }
    barsHtml += `<div class="gantt-bar" data-id="${t.id}" style="left:${x}px;width:${w}px;background:${t.color};top:${idx * 40 + 8}px;" 
      oncontextmenu="showContext(event,${t.id})" 
      ondblclick="openEditTaskModal(${t.id})"
      onmousedown="startDrag(event,${t.id})"
      onmouseenter="showTip(event,${t.id})" onmouseleave="hideTip()">
      <div class="bar-progress" style="width:${t.progress}%"></div>
      <span class="bar-label">${w > 60 ? t.name : ''}</span>
      <div class="resize-handle left" onmousedown="startResize(event,${t.id},'left')"></div>
      <div class="resize-handle right" onmousedown="startResize(event,${t.id},'right')"></div>
    </div>`;
  });

  // Dependency arrows
  let depHtml = '';
  tasks.forEach((t, tIdx) => {
    if (t.deps && t.deps.length) {
      t.deps.forEach(depId => {
        const dep = getTaskById(depId);
        if (!dep) return;
        const depIdx = tasks.indexOf(dep);
        if (depIdx < 0) return;
        const fromX = dateToPixel(dep.end) + dayW; // end of dep bar
        const fromY = depIdx * 40 + 20;
        const toX = dateToPixel(t.start);
        const toY = tIdx * 40 + 20;
        const midX = (fromX + toX) / 2;
        depHtml += `<path class="dep-arrow" d="M${fromX},${fromY} C${midX},${fromY} ${midX},${toY} ${toX},${toY}"/>`;
      });
    }
  });
  if (depHtml) {
    barsHtml += `<svg style="position:absolute;top:0;left:0;width:${totalWidth}px;height:${tasks.length*40}px;pointer-events:none;z-index:1;">${depHtml}</svg>`;
  }

  // Add bars container
  const barsContainer = document.createElement('div');
  barsContainer.className = 'gantt-bar-container';
  barsContainer.innerHTML = barsHtml;
  bodyEl.appendChild(barsContainer);
}

function updateStats() {
  const tasks = project.tasks;
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const inProg = tasks.filter(t => t.status === 'progress').length;
  const todo = tasks.filter(t => t.status === 'todo').length;
  const avgProgress = total ? Math.round(tasks.reduce((s,t)=>s+t.progress,0)/total) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="stat">Tasks: <span>${total}</span></div>
    <div class="stat">Done: <span>${done}</span></div>
    <div class="stat">Active: <span>${inProg}</span></div>
    <div class="stat">To Do: <span>${todo}</span></div>
    <div class="stat">Overall: <span>${avgProgress}%</span></div>
  `;
}

// ─── Zoom & View ───
function zoomIn() {
  zoom = Math.min(3, zoom + 0.25);
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
  render();
}
function zoomOut() {
  zoom = Math.max(0.25, zoom - 0.25);
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
  render();
}
function setView(mode, btn) {
  viewMode = mode;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}
function scrollToToday() {
  const panel = document.getElementById('ganttPanel');
  const x = dateToPixel(todayStr());
  panel.scrollLeft = Math.max(0, x - panel.clientWidth / 2);
  document.getElementById('taskList').scrollTop = 0;
}
function fitToScreen() {
  if (!project.tasks.length) return;
  const panel = document.getElementById('ganttPanel');
  const origin = getOriginDate();
  const endDate = getEndDate();
  const totalDays = daysBetween(origin.toISOString().slice(0,10), endDate.toISOString().slice(0,10));
  const base = {day:36, week:20, month:8}[viewMode];
  zoom = Math.max(0.25, Math.min(3, (panel.clientWidth - 400) / (totalDays * base)));
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
  render();
}

// ─── Task CRUD ───
function openAddTaskModal() {
  editingTaskId = null;
  document.getElementById('modalTitle').textContent = 'Add Task';
  document.getElementById('deleteTaskBtn').style.display = 'none';
  document.getElementById('taskNameInput').value = '';
  document.getElementById('taskDescInput').value = '';
  document.getElementById('taskStartInput').value = todayStr();
  document.getElementById('taskEndInput').value = addDays(todayStr(), 7);
  document.getElementById('taskStatusInput').value = 'todo';
  document.getElementById('taskProgressInput').value = 0;
  document.getElementById('taskAssigneeInput').value = '';
  document.getElementById('taskPriorityInput').value = 'medium';
  populateDepsSelect();
  renderColorOptions(COLORS[0]);
  document.getElementById('taskModal').classList.add('show');
}

function openEditTaskModal(id) {
  const t = getTaskById(id);
  if (!t) return;
  editingTaskId = id;
  selectedTaskId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('deleteTaskBtn').style.display = '';
  document.getElementById('taskNameInput').value = t.name;
  document.getElementById('taskDescInput').value = t.desc || '';
  document.getElementById('taskStartInput').value = t.start;
  document.getElementById('taskEndInput').value = t.end;
  document.getElementById('taskStatusInput').value = t.status;
  document.getElementById('taskProgressInput').value = t.progress;
  document.getElementById('taskAssigneeInput').value = t.assignee || '';
  document.getElementById('taskPriorityInput').value = t.priority || 'medium';
  populateDepsSelect(id, t.deps || []);
  renderColorOptions(t.color);
  document.getElementById('taskModal').classList.add('show');
}

function closeModal() {
  document.getElementById('taskModal').classList.remove('show');
}

function populateDepsSelect(excludeId, selected) {
  const sel = document.getElementById('taskDepsInput');
  sel.innerHTML = project.tasks
    .filter(t => t.id !== excludeId)
    .map(t => `<option value="${t.id}" ${selected && selected.includes(t.id)?'selected':''}>${t.name}</option>`)
    .join('');
}

function renderColorOptions(selected) {
  const el = document.getElementById('colorOptions');
  el.innerHTML = COLORS.map(c => 
    `<div class="color-opt ${c===selected?'selected':''}" style="background:${c}" onclick="selectColor(this,'${c}')"></div>`
  ).join('');
}
function selectColor(el, color) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function saveTask() {
  const name = document.getElementById('taskNameInput').value.trim();
  if (!name) { showToast('Task name is required'); return; }
  const start = document.getElementById('taskStartInput').value;
  const end = document.getElementById('taskEndInput').value;
  if (!start || !end) { showToast('Start and end dates are required'); return; }
  if (start > end) { showToast('End date must be after start date'); return; }
  
  const status = document.getElementById('taskStatusInput').value;
  const progress = parseInt(document.getElementById('taskProgressInput').value) || 0;
  const assignee = document.getElementById('taskAssigneeInput').value.trim();
  const priority = document.getElementById('taskPriorityInput').value;
  const desc = document.getElementById('taskDescInput').value.trim();
  const deps = Array.from(document.getElementById('taskDepsInput').selectedOptions).map(o => parseInt(o.value));
  const colorEl = document.querySelector('.color-opt.selected');
  const color = colorEl ? colorEl.style.background : COLORS[0];

  saveState();

  if (editingTaskId) {
    const t = getTaskById(editingTaskId);
    Object.assign(t, {name, start, end, status, progress, assignee, priority, desc, deps, color});
    showToast('Task updated');
  } else {
    const indent = 0;
    project.tasks.push({id:nextId++, name, start, end, color, status, progress:Math.min(100,Math.max(0,progress)), assignee, priority, deps, desc, indent});
    showToast('Task added');
  }
  
  closeModal();
  render();
}

function deleteTask() {
  if (!editingTaskId) return;
  saveState();
  project.tasks = project.tasks.filter(t => t.id !== editingTaskId);
  // Remove dependencies pointing to deleted task
  project.tasks.forEach(t => { t.deps = (t.deps||[]).filter(d => d !== editingTaskId); });
  showToast('Task deleted');
  closeModal();
  render();
}

function selectTask(id) {
  selectedTaskId = id;
  renderTaskList();
}

// ─── Context Menu ───
function showContext(e, id) {
  e.preventDefault();
  e.stopPropagation();
  contextTaskId = id;
  const menu = document.getElementById('contextMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('show');
}
function hideContext() {
  document.getElementById('contextMenu').classList.remove('show');
}
function editContextTask() { hideContext(); openEditTaskModal(contextTaskId); }
function duplicateContextTask() {
  hideContext();
  const t = getTaskById(contextTaskId);
  if (!t) return;
  saveState();
  const newTask = {...t, id:nextId++, name:t.name+' (Copy)', deps:[]};
  project.tasks.push(newTask);
  showToast('Task duplicated');
  render();
}
function indentContextTask() {
  hideContext();
  const t = getTaskById(contextTaskId);
  if (!t) return;
  saveState();
  t.indent = Math.min(4, t.indent + 1);
  render();
}
function outdentContextTask() {
  hideContext();
  const t = getTaskById(contextTaskId);
  if (!t) return;
  saveState();
  t.indent = Math.max(0, t.indent - 1);
  render();
}
function setContextStatus(status) {
  hideContext();
  const t = getTaskById(contextTaskId);
  if (!t) return;
  saveState();
  t.status = status;
  if (status === 'done') t.progress = 100;
  render();
}
function deleteContextTask() {
  hideContext();
  saveState();
  project.tasks = project.tasks.filter(t => t.id !== contextTaskId);
  project.tasks.forEach(t => { t.deps = (t.deps||[]).filter(d => d !== contextTaskId); });
  if (selectedTaskId === contextTaskId) selectedTaskId = null;
  showToast('Task deleted');
  render();
}

// ─── Drag & Resize ───
function startDrag(e, id) {
  if (e.target.classList.contains('resize-handle')) return;
  e.preventDefault();
  const t = getTaskById(id);
  const bar = e.currentTarget;
  const startX = e.clientX;
  const origLeft = parseInt(bar.style.left);
  const panel = document.getElementById('ganttPanel');
  const scrollLeft = panel.scrollLeft;
  
  saveState();
  
  const onMove = (ev) => {
    const dx = ev.clientX - startX;
    bar.style.left = (origLeft + dx) + 'px';
  };
  const onUp = (ev) => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const dx = ev.clientX - startX;
    const newLeft = origLeft + dx;
    const newStart = pixelToDate(newLeft);
    const duration = daysBetween(t.start, t.end);
    t.start = newStart;
    t.end = addDays(newStart, duration);
    render();
    showToast('Task moved');
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startResize(e, id, side) {
  e.preventDefault();
  e.stopPropagation();
  const t = getTaskById(id);
  const bar = document.querySelector(`.gantt-bar[data-id="${id}"]`);
  const startX = e.clientX;
  const origLeft = parseInt(bar.style.left);
  const origWidth = parseInt(bar.style.width);
  const dayW = getDayWidth();
  
  saveState();
  
  const onMove = (ev) => {
    const dx = ev.clientX - startX;
    if (side === 'right') {
      bar.style.width = Math.max(dayW, origWidth + dx) + 'px';
    } else {
      const newLeft = origLeft + dx;
      const newWidth = origWidth - dx;
      if (newWidth >= dayW) {
        bar.style.left = newLeft + 'px';
        bar.style.width = newWidth + 'px';
      }
    }
  };
  const onUp = (ev) => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const dx = ev.clientX - startX;
    if (side === 'right') {
      const newWidth = Math.max(dayW, origWidth + dx);
      const dur = Math.max(1, Math.round(newWidth / dayW));
      t.end = addDays(t.start, dur - 1);
    } else {
      const newLeft = origLeft + dx;
      const newStart = pixelToDate(newLeft);
      if (newStart <= t.end) {
        t.start = newStart;
      }
    }
    render();
    showToast('Task resized');
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ─── Tooltip ───
function showTip(e, id) {
  const t = getTaskById(id);
  if (!t) return;
  const tip = document.getElementById('tooltip');
  document.getElementById('tipTitle').textContent = t.name;
  document.getElementById('tipStart').textContent = formatDate(t.start);
  document.getElementById('tipEnd').textContent = formatDate(t.end);
  document.getElementById('tipAssignee').textContent = t.assignee || 'Unassigned';
  document.getElementById('tipStatus').textContent = STATUS_LABELS[t.status];
  document.getElementById('tipProgress').textContent = t.progress + '%';
  const bar = document.getElementById('tipBar');
  bar.style.width = t.progress + '%';
  bar.style.background = t.color;
  
  let x = e.clientX + 16;
  let y = e.clientY - 10;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
  tip.classList.add('show');
}
function hideTip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ─── Undo ───
function undo() {
  if (!undoStack.length) { showToast('Nothing to undo'); return; }
  project = undoStack.pop();
  nextId = Math.max(...project.tasks.map(t=>t.id), 0) + 1;
  showToast('Undone');
  render();
}

// ─── Export / Import ───
function exportJSON() {
  project.name = document.getElementById('projectName').value;
  const blob = new Blob([JSON.stringify(project, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (project.name || 'gantt-project') + '.json';
  a.click();
  showToast('Project exported');
}
function importJSON() {
  document.getElementById('fileInput').click();
}
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      saveState();
      project = data;
      document.getElementById('projectName').value = project.name || 'Imported Project';
      nextId = Math.max(...project.tasks.map(t=>t.id), 0) + 1;
      render();
      showToast('Project imported');
    } catch(err) {
      showToast('Invalid file format');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── Search ───
function filterTasks() { render(); }

// ─── Global Events ───
document.addEventListener('click', () => {
  hideContext();
  hideTip();
});
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.key === 'Delete' && selectedTaskId) {
    saveState();
    project.tasks = project.tasks.filter(t => t.id !== selectedTaskId);
    project.tasks.forEach(t => { t.deps = (t.deps||[]).filter(d => d !== selectedTaskId); });
    selectedTaskId = null;
    render();
    showToast('Task deleted');
  }
  if (e.key === 'Escape') { closeModal(); hideContext(); }
});

// Sync scroll between task list and gantt body
const taskList = document.getElementById('taskList');
const ganttPanel = document.getElementById('ganttPanel');
let syncing = false;
taskList.addEventListener('scroll', () => {
  if (syncing) return;
  syncing = true;
  ganttPanel.scrollTop = taskList.scrollTop;
  syncing = false;
});
ganttPanel.addEventListener('scroll', () => {
  if (syncing) return;
  syncing = true;
  taskList.scrollTop = ganttPanel.scrollTop;
  syncing = false;
});

// ─── Init ───
render();
setTimeout(scrollToToday, 100);
</script>
